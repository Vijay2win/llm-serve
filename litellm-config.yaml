model_list:
  - model_name: openai/qwen3.5-122b
    litellm_params:
      model: openai/qwen3.5-122b
      api_base: http://localhost:8000/v1
      api_key: "sk-spark-llm"
    model_info:
      description: "Qwen3.5-122B NVFP4 — no thinking, fast responses"
      max_input_tokens: 204800
      max_output_tokens: 32768
      supports_vision: true

  - model_name: openai/qwen3.5-122b-thinking
    litellm_params:
      model: openai/qwen3.5-122b
      api_base: http://localhost:8000/v1
      api_key: "sk-spark-llm"
      extra_body:
        chat_template_kwargs:
          enable_thinking: true
    model_info:
      description: "Qwen3.5-122B NVFP4 — chain-of-thought reasoning enabled, use max_tokens >= 4096"
      max_input_tokens: 204800
      max_output_tokens: 32768
      supports_vision: true

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: "sk-local-llm"
  # database_url is set via DATABASE_URL env var in start-litellm.sh
  disable_spend_logs: false
